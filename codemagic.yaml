workflows:
  marnie-pos-android:
    name: Marnie Store POS (Android)
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - marnie_pos_secrets   # create this group in Codemagic UI (see docs/DEPLOY.md)
      vars:
        # Non-secret build-time config — override per branch/workflow if you
        # run staging vs production backends.
        API_BASE_URL: "https://api.yourdomain.com/"
        API_HOST: "api.yourdomain.com"
      android_signing:
        - marnie_pos_keystore   # upload your .jks under this reference in Codemagic
      groups_note: >
        marnie_pos_secrets should define: CERT_PIN_SHA256 (optional; the
        backend's public key pin), plus anything you template into
        gradle.properties. Never put NEON_* secrets here — those belong on
        the backend host, not the mobile app.
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set Android SDK license
        script: yes | sdkmanager --licenses || true
      - name: Decode keystore / apply signing (Codemagic CLI handles this via android_signing above)
        script: |
          echo "Signing config is injected automatically by the android_signing integration."
      - name: Build release AAB
        script: |
          ./gradlew clean bundleRelease \
            -PAPI_BASE_URL="$API_BASE_URL" \
            -PAPI_HOST="$API_HOST" \
            -PCERT_PIN_SHA256="$CERT_PIN_SHA256"
      - name: Build release APK (for direct install/testing)
        script: |
          ./gradlew assembleRelease \
            -PAPI_BASE_URL="$API_BASE_URL" \
            -PAPI_HOST="$API_HOST" \
            -PCERT_PIN_SHA256="$CERT_PIN_SHA256"
    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
      # Uncomment once you have a Play Console service account JSON in Codemagic:
      # google_play:
      #   credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
      #   track: internal
      #   submit_as_draft: true
